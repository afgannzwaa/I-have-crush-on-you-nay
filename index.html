<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>I have a crush on you</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/typed.js@2.0.16/dist/typed.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        :root {
            --primary: #6c5ce7; /* Modern Purple */
            --accent: #ff7675;  /* Soft Red */
            --text-dark: #2d3436;
            --card-bg: rgba(255, 255, 255, 0.4); /* Glass Effect */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

        body {
            /* --- BACKGROUND KEREN: AURORA GRADIENT --- */
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* --- DEKORASI BG: ABSTRACT MOVING SHAPES --- */
        .bg-decor {
            position: absolute;
            width: 100%; height: 100%;
            top: 0; left: 0;
            z-index: 1;
        }

        .shape {
            position: absolute;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            border-radius: 50%;
            opacity: 0.15;
            filter: blur(80px); /* Efek awan */
            animation: floating 25s infinite ease-in-out alternate;
        }

        @keyframes floating {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(60px, -80px) scale(1.1); }
            100% { transform: translate(-40px, 40px) scale(1); }
        }

        /* --- KARTU SESUAI: GLASSMORPHISM --- */
        #container {
            position: relative;
            z-index: 10;
            width: 88%;
            max-width: 390px;
            background: var(--card-bg);
            /* Efek Kaca */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            text-align: center;
            /* Performa Halus */
            transform: translate3d(0,0,0);
            will-change: transform, opacity;
        }

        .media-box {
            height: 160px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #display-img {
            max-width: 150px;
            max-height: 150px;
            object-fit: contain;
            /* PNG Fix: Drop shadow mengikuti bentuk */
            filter: drop-shadow(0 12px 25px rgba(108, 92, 231, 0.25));
            background: transparent !important;
        }

        #typed-box {
            font-size: 1.05rem;
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 75px;
            margin-bottom: 25px;
            font-weight: 400;
        }

        .action-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            min-height: 55px;
        }

        /* Tombol Modern & Keren */
        .btn {
            display: none;
            opacity: 0;
            padding: 14px 28px;
            border-radius: 18px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .btn-sub {
            background: rgba(255, 255, 255, 0.7);
            color: #666;
            box-shadow: none;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 12px 30px rgba(108, 92, 231, 0.4);
        }

        .btn:active { transform: scale(0.96); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="bg-decor">
        <div class="shape" style="width: 400px; height: 400px; top: -150px; left: -100px;"></div>
        <div class="shape" style="width: 300px; height: 300px; bottom: -80px; right: -80px; animation-delay: -5s; background: linear-gradient(135deg, #ff7675 0%, #fab1a0 100%);"></div>
    </div>

    <main id="container">
        <audio id="audio" src="love1.mp3" loop></audio>

        <div id="view-start">
            <h2 style="font-family: 'Playfair Display', serif; color: var(--primary); margin-bottom: 25px; font-size: 1.8rem;">Halo Naya...</h2>
            <button class="btn" style="display:inline-block; opacity:1;" onclick="start()">Buka Pesan</button>
        </div>

        <div id="view-main" class="hidden">
            <div class="media-box">
                <img id="display-img" src="gif1.gif">
            </div>
            <div id="typed-text"></div>
            <div class="action-area">
                <button id="btn-next" class="btn" onclick="toStep2()">Lanjut ya?</button>
                <button id="btn-yes" class="btn" onclick="onYes()">Yes, I will</button>
                <button id="btn-no" class="btn btn-sub" onclick="onNo()">No</button>
                <button id="btn-color" class="btn" onclick="askColor()">Bantuin isi ya?</button>
                <button id="btn-food" class="btn" onclick="askFood()">Lanjut isi lagi?</button>
                <button id="btn-ultah" class="btn" onclick="askBirthday()">Terakhir deh janji..</button>
            </div>
        </div>
    </main>

    <script>
        const URL = 'https://formspree.io/f/xpqjgban';
        let bundle = { Jawaban: "", Warna: "", Makanan: "", Ultah: "", Alasan: "" };
        let typed = null;

        // --- Optimized Smooth Engine (No Lag) ---
        function change(img, text, btns) {
            // Hilangkan tombol lama seketika
            document.querySelectorAll('.btn').forEach(b => { b.style.display = 'none'; b.style.opacity = 0; });

            // Animasi konten keluar (Fade & Slide Ringan)
            gsap.to(["#display-img", "#typed-text"], { opacity: 0, y: -10, duration: 0.3, ease: "power2.in", onComplete: () => {
                if(img) document.getElementById('display-img').src = img;
                document.getElementById('typed-text').innerHTML = "";

                // Animasi konten masuk
                gsap.to(["#display-img", "#typed-text"], { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" });

                if(typed) typed.destroy();
                typed = new Typed('#typed-text', {
                    strings: [text],
                    typeSpeed: 35,
                    showCursor: false,
                    onComplete: () => {
                        if(btns) show(btns);
                    }
                });
            }});
        }

        function show(ids) {
            const list = Array.isArray(ids) ? ids : [ids];
            list.forEach(id => {
                const el = document.getElementById(id);
                el.style.display = 'inline-block';
                // Animasi tombol "mengembang" keluar
                gsap.to(el, { opacity: 1, duration: 0.6, ease: "back.out(1.7)" });
            });
        }

        function start() {
            document.getElementById('audio').play();
            document.getElementById('view-start').classList.add('hidden');
            document.getElementById('view-main').classList.remove('hidden');
            change('gif1.gif', 'haii nayaa gimana tampilan awal web nyaa?? baguss gaa, baguss dong yang buat kan afgan.', 'btn-next');
        }

        function toStep2() { change('gif2.gif', 'Will you be my favorite person?', ['btn-yes', 'btn-no']); }
        function onYes() { bundle.Jawaban = "YES"; change('gif3.gif', 'makasihh, aku jamin akan jadi seseorang dengan pengalaman terbaik yang mungkin pernah kamu temuin', 'btn-color'); }

        async function askColor() {
            change('gif4.gif', 'kamu suka warna apa, nayy?', null);
            const res = await pop('Warna favorit lu apa nay?');
            if(res) { bundle.Warna = res; show('btn-food'); }
        }

        async function askFood() {
            change('gif5.gif', 'nayaa suka makanan apa?', null);
            const res = await pop('Makanan favorit Naya?');
            if(res) { bundle.Makanan = res; show('btn-ultah'); }
        }

        async function askBirthday() {
            change('gif6.gif', 'nayy silahkan isi tanggal ulang tahun nyaa yaa, nantii aku kasih somting sesuatu hehek', null);
            const res = await pop('Kapan ulang tahunmu?');
            if(res) { 
                bundle.Ultah = res;
                // Kirim data sekaligus
                fetch(URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(bundle)});
                change('gif7.gif', 'maaf yahh banyak tanyaa… dan makasih yahh udah mau jawab babayy', null);
                setTimeout(() => { window.location.href = "https://wa.me/6283140272194?text=udah%20semua%20apgann%0A"; }, 4000);
            }
        }

        function pop(t) {
            return Swal.fire({
                title: t,
                input: 'text',
                confirmButtonColor: '#6c5ce7',
                allowOutsideClick: false,
                background: 'rgba(255,255,255,0.9)',
                backdrop: 'rgba(108, 92, 231, 0.1)',
                preConfirm: (v) => v || Swal.showValidationMessage('Isi dulu ya Nay')
            }).then(r => r.value);
        }

        async function onNo() {
            const res = await pop('Kenapa nolak? :(');
            if(res) {
                bundle.Jawaban = "NO"; bundle.Alasan = res;
                fetch(URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(bundle)});
                Swal.fire('Info', 'Makasih ya sudah jujur.', 'info');
            }
        }
    </script>
</body>
</html>
